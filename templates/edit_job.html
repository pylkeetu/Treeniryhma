<!DOCTYPE html>
<html>
<head>
    <title>Muokkaa työvuoroa</title>
</head>
<body>
    <h1>Muokkaa työvuoroa</h1>

    <form action="/job/{{ job['id'] }}/edit" method="POST">
        <label>Otsikko:</label><br>
        <input type="text" name="title" value="{{ job['title'] }}" required><br><br>

        <label>Kuvaus:</label><br>
        <textarea name="description" rows="4" cols="50" required>{{ job['description'] }}</textarea><br><br>

        <label>Osallistujien määrä:</label><br>
        <input type="number" name="participants" value="{{ job['participants'] }}" required><br><br>

        <button type="submit">Tallenna muutokset</button>
    </form>

    <br>
    <a href="/job/{{ job['id'] }}">Peruuta</a>
</body>
</html>
