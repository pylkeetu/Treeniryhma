<h1>{{ job['title'] }}</h1>
<p>{{ job['description'] }}</p>
<p>Osallistujat: {{ job['participants'] }}</p>
<p>Lisätty työntekijän ID: {{ job['employee_id'] }}</p>

<a href="/job/{{ job['id'] }}/edit">Muokkaa</a>

<form action="/job/{{ job['id'] }}/delete" method="POST" style="display:inline">
    <button type="submit" onclick="return confirm('Haluatko varmasti poistaa tämän työvuoron?')">
        Poista
    </button>
</form>

<br><br>
<a href="/">Takaisin listaan</a>
