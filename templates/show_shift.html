<h1>{{ shift['title'] }}</h1>
<p>{{ shift['description'] }}</p>
<p>Osallistujat: {{ shift['participants'] }}</p>
<p>Työvuoron tekijä: {{ shift.username }}</p>

<a href="/shift/{{ shift['id'] }}/edit">Muokkaa</a>

<form action="/shift/{{ shift['id'] }}/delete" method="POST" style="display:inline">
    <button type="submit" onclick="return confirm('Haluatko varmasti poistaa tämän työvuoron?')">
        Poista
    </button>
</form>

<br><br>
<a href="/">Takaisin etusivulle</a>
